name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: emoclew_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Prisma migrations on test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/emoclew_test

      - run: npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/emoclew_test
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          JWT_EXPIRES_IN: 15m
          FRONTEND_URL: http://localhost:3000
          NODE_ENV: test