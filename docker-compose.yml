version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: emoclew_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - emoclew_pgdata:/var/lib/postgresql/data

volumes:
  emoclew_pgdata:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24

